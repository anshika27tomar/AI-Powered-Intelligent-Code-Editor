<!DOCTYPE html>
<html>
<head>
    <title>Templates | CodeMind AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 60px 10%; }
        .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 40px;}
        .template-card { background: #151719; border: 1px solid #222; border-radius: 15px; padding: 20px; text-align: center;}
        .template-card img { width: 100%; border-radius: 10px; margin-bottom: 15px;}
        .btn-sm { background: #2ecc71; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 700;}
    </style>
</head>
<body>
    <a href="index.html" style="color: #2ecc71; text-decoration: none;">← Home</a>
    <h1 style="margin-top: 20px;">Starter Templates</h1>
    <p>Launch your BCA project in seconds with our verified templates.</p>

    <div class="template-grid">
        <div class="template-card">
            <h3>Library Management</h3>
            <p>Java + MySQL</p>
            <button class="btn-sm">Use Template</button>
        </div>
        <div class="template-card">
            <h3>Student Portfolio</h3>
            <p>HTML + CSS + JS</p>
            <button class="btn-sm">Use Template</button>
        </div>
        <div class="template-card">
            <h3>Inventory System</h3>
            <p>Python + SQLite</p>
            <button class="btn-sm">Use Template</button>
        </div>
    </div>
</body>
</html>
